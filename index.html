<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBAN'S FAST | Network Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Consolas', 'Courier New', monospace; }
        .glow { text-shadow: 0 0 10px #00ff41; }
        .border-glow { border: 1px solid #1a1a1a; box-shadow: 0 0 20px rgba(0, 255, 65, 0.05); }
        .log-entry { font-size: 0.75rem; color: #666; border-left: 2px solid #00ff41; padding-left: 8px; margin-bottom: 4px; }
        #speed-gauge { transition: width 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>
<body class="p-4 md:p-12 flex flex-col items-center min-h-screen">
    <div class="max-w-2xl w-full border-glow p-8 bg-black rounded-sm border-t-4 border-t-green-500">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-4xl font-black italic glow tracking-tighter uppercase">SOBAN'S FAST</h1>
                <p class="text-xs text-zinc-500 uppercase tracking-widest">High-Performance Network Audit</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] bg-green-900 text-green-300 px-2 py-1 rounded font-bold uppercase">System: Online</span>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-zinc-900/50 border border-zinc-800">
                <p class="text-[10px] text-zinc-500 uppercase mb-1">Access_Node</p>
                <p id="ip-address" class="text-lg font-bold font-mono tracking-tight text-zinc-200 uppercase">Locating...</p>
            </div>
            <div class="p-4 bg-zinc-900/50 border border-zinc-800">
                <p class="text-[10px] text-zinc-500 uppercase mb-1">Provider_ISP</p>
                <p id="isp" class="text-lg font-bold font-mono tracking-tight text-zinc-200 uppercase truncate">Scanning...</p>
            </div>
        </div>
        <div class="mb-10">
            <div class="flex justify-between mb-3 items-end">
                <span class="text-[10px] uppercase font-bold text-zinc-400">Throughput_Analysis</span>
                <span id="speed-value" class="text-xl font-black italic">0.00 MS</span>
            </div>
            <div class="w-full bg-zinc-900 h-2 overflow-hidden border border-zinc-800">
                <div id="speed-gauge" class="bg-green-500 h-full w-0"></div>
            </div>
        </div>
        <div class="flex flex-col items-center gap-6">
            <button onclick="initiateScan()" class="w-full py-4 bg-white text-black font-black uppercase text-sm hover:bg-green-500 transition-colors tracking-widest">
                Initiate Turbo Scan
            </button>
            <div id="log-container" class="w-full h-32 bg-zinc-950 border border-zinc-900 p-3 overflow-y-auto font-mono text-left">
                <div class="log-entry text-green-500">System Ready. Awaiting user input...</div>
            </div>
        </div>
    </div>
    <script>
        const logContainer = document.getElementById('log-container');
        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerText = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            logContainer.prepend(div);
        }
        async function fetchNetworkInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                document.getElementById('ip-address').innerText = data.ip;
                document.getElementById('isp').innerText = data.org;
                addLog('Node localized: ' + data.city + ', ' + data.country_name);
            } catch (error) {
                document.getElementById('ip-address').innerText = "PROTECTED";
                document.getElementById('isp').innerText = "UNKNOWN_GATEWAY";
                addLog("Warning: External data fetch blocked.");
            }
        }
        function initiateScan() {
            const gauge = document.getElementById('speed-gauge');
            const val = document.getElementById('speed-value');
            addLog("Starting Turbo_Stack optimization scan...");
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    addLog("Throughput scan complete. Stability: 100%");
                }
                gauge.style.width = progress + '%';
                val.innerText = (progress * 1.5).toFixed(2) + " MS";
            }, 100);
        }
        fetchNetworkInfo();
    </script>
</body>
</html>
